    <radialGradient id="sun" cx=".15" cy=".2" r=".6">
      <stop stop-color="#fff7c2"/>
      <stop offset=".35" stop-color="#ffe28a" stop-opacity=".6"/>
      <stop offset="1" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>
    <filter id="shadow" x="-30%" y="-30%" width="160%" height="170%">
