      <stop stop-color="#f8fbff"/>
      <stop offset=".55" stop-color="#d9e7f5"/>
      <stop offset="1" stop-color="#0b2340"/>
    </linearGradient>
    <linearGradient id="wallBlue" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#18416b"/>
      <stop offset="1" stop-color="#071a31"/>
    </linearGradient>
    <linearGradient id="desk" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#4b5563"/>
      <stop offset=".52" stop-color="#1f2937"/>
      <stop offset="1" stop-color="#07111f"/>
    </linearGradient>
    <linearGradient id="tablet" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#17233a"/>
      <stop offset=".45" stop-color="#071a2e"/>
      <stop offset="1" stop-color="#020817"/>
    </linearGradient>
    <linearGradient id="screen" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#064c84"/>
      <stop offset=".45" stop-color="#082a58"/>
      <stop offset="1" stop-color="#031026"/>
